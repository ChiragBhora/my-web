trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

steps:

- checkout: self

- script: |
    echo "================================="
    echo "Running Application Tests"
    echo "================================="
    echo "Tests Passed Successfully"
  displayName: 'Run Tests'

- script: |
    if [ -z "$(SWA_TOKEN)" ]; then
      echo "ERROR: SWA_TOKEN is empty"
      exit 1
    else
      echo "Deployment token found"
    fi
  displayName: 'Validate Deployment Token'

- task: AzureStaticWebApp@0
  displayName: 'Deploy Azure Static Web App'
  inputs:
    app_location: '/'
    output_location: ''
    skip_app_build: true
    azure_static_web_apps_api_token: $(SWA_TOKEN)