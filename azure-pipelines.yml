trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

steps:

- checkout: self

- script: |
    echo "Running tests..."
    echo "All tests passed"
  displayName: 'Run Tests'

- task: AzureStaticWebApp@0
  inputs:
    app_location: '/'
    output_location: ''
    skip_app_build: true
    azure_static_web_apps_api_token: $(SWA_TOKEN)